spring:
  application:
    name: spring-boot

  datasource:
    url: jdbc:mysql://localhost:3306/demo_db
    username: root
    password: root

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect

server:
  port: 8080

logging:
  level:
    root: DEBUG
#You can control the logging level #go to spring website and check appendix -> common application properties to check all the properties